<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline – Ergon</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0f2c;color:#f1f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:40px 32px;max-width:420px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
    .icon{font-size:64px;margin-bottom:20px;display:block}
    h1{font-size:1.5rem;font-weight:700;margin-bottom:12px;color:#f8fafc}
    p{color:#94a3b8;font-size:0.95rem;line-height:1.6;margin-bottom:28px}
    .btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border:none;border-radius:8px;padding:12px 24px;font-size:0.95rem;font-weight:600;cursor:pointer;text-decoration:none;transition:opacity .2s}
    .btn:hover{opacity:.9}
    .status{margin-top:20px;font-size:0.8rem;color:#64748b}
    .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#ef4444;margin-right:6px;animation:blink 1.5s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    @media(prefers-color-scheme:light){body{background:#f8fafc;color:#1e293b}.card{background:#fff;border-color:#e2e8f0}h1{color:#0f172a}p{color:#64748b}.status{color:#94a3b8}}
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">📡</span>
    <h1>You're Offline</h1>
    <p>Ergon can't reach the server right now. Check your connection and try again — your session will resume automatically.</p>
    <button class="btn" onclick="retry()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
      Try Again
    </button>
    <div class="status"><span class="dot"></span>No internet connection</div>
  </div>
  <script>
    function retry() {
      window.location.reload();
    }
    // Auto-retry when connection restores
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
